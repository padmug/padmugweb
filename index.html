<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Padmug Web</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:linear-gradient(180deg,#dffaf2,#ffffff);
}

.container{
max-width:420px;
margin:auto;
padding:20px;
padding-bottom:90px;
}

.header{
text-align:center;
margin-bottom:15px;
}

.header h1{
color:#0aa67a;
margin:0;
}

.card{

background:white;
border-radius:16px;
padding:18px;
margin-bottom:14px;

box-shadow:0 10px 25px rgba(0,0,0,0.08);

}

.points{

font-size:28px;
font-weight:bold;
color:#0aa67a;

}

.progress{

height:8px;
background:#e4e4e4;
border-radius:10px;
margin-top:10px;
overflow:hidden;

}

.bar{

height:8px;
background:#0aa67a;
width:0%;

}

button{

width:100%;
border:none;
padding:14px;
margin-top:10px;
border-radius:10px;
background:#0aa67a;
color:white;
font-size:15px;

}

button:active{
transform:scale(.98);
}

.section{
display:none;
}

.active{
display:block;
}

.navbar{

position:fixed;
bottom:0;
left:0;
right:0;

background:white;
border-top:1px solid #eee;

display:flex;
justify-content:space-around;

padding:10px 0;

}

.navbtn{

text-align:center;
font-size:12px;
color:#666;

}

.navbtn span{

display:block;
font-size:22px;

}

.activity{

font-size:14px;
color:#555;

}

</style>
</head>

<body>

<div class="container">

<div class="header">

<h1>Padmug Web</h1>

<div id="welcome"></div>

</div>


<div class="card">

⭐ Points

<div class="points" id="points">0</div>

<div class="progress">

<div class="bar" id="progressbar"></div>

</div>

</div>


<div id="home" class="section active">

<div class="card">

<b>Welcome</b>

<p class="activity">

Use the menu below to explore Padmug Web.

</p>

</div>

</div>


<div id="daily" class="section">

<div class="card">

<h3>🎁 Daily Reward</h3>

<button onclick="claimDaily()">

Claim +10 Points

</button>

<p id="dailyStatus"></p>

</div>

</div>


<div id="giveaway" class="section">

<div class="card">

<h3>🎟 Giveaway Entry</h3>

<p>Cost: 20 points</p>

<button onclick="joinGiveaway()">

Enter Giveaway

</button>

<p id="giveawayStatus"></p>

</div>

</div>


<div id="profile" class="section">

<div class="card">

<h3>👤 Profile</h3>

<p id="profileInfo"></p>

</div>

</div>


<div class="card">

<h3>📊 Activity</h3>

<ul id="activityLog"></ul>

</div>

</div>


<div class="navbar">

<div class="navbtn" onclick="show('home')">

<span>🏠</span>

Home

</div>

<div class="navbtn" onclick="show('daily')">

<span>🎁</span>

Daily

</div>

<div class="navbtn" onclick="show('giveaway')">

<span>🎟</span>

Giveaway

</div>

<div class="navbtn" onclick="show('profile')">

<span>👤</span>

Profile

</div>

</div>


<script>

const tg = window.Telegram.WebApp;

tg.expand();

const user = tg.initDataUnsafe.user;

if(user){

document.getElementById("welcome").innerText=
"Hello "+user.first_name;

document.getElementById("profileInfo").innerHTML=

"<b>Name:</b> "+user.first_name+

"<br><b>Username:</b> @"+(user.username || "none")+

"<br><b>ID:</b> "+user.id;

}

function show(section){

document.querySelectorAll(".section")

.forEach(s=>s.classList.remove("active"));

document.getElementById(section)

.classList.add("active");

}

function getPoints(){

let p=localStorage.getItem("padmug_points");

if(!p) p=0;

return parseInt(p);

}

function setPoints(val){

localStorage.setItem("padmug_points",val);

document.getElementById("points").innerText=val;

updateProgress();

}

function updateProgress(){

let p=getPoints();

let percent=(p/100)*100;

if(percent>100) percent=100;

document.getElementById("progressbar")

.style.width=percent+"%";

}

function claimDaily(){

let last=localStorage.getItem("padmug_daily");

let today=new Date().toDateString();

if(last===today){

document.getElementById("dailyStatus")

.innerText="Already claimed today.";

return;

}

let points=getPoints()+10;

setPoints(points);

localStorage.setItem("padmug_daily",today);

document.getElementById("dailyStatus")

.innerText="+10 points added!";

logActivity("Claimed daily reward");

}

function joinGiveaway(){

let points=getPoints();

if(points<20){

document.getElementById("giveawayStatus")

.innerText="Not enough points.";

return;

}

points-=20;

setPoints(points);

document.getElementById("giveawayStatus")

.innerText="Entry confirmed!";

logActivity("Entered giveaway");

}

function logActivity(text){

let list=document.getElementById("activityLog");

let item=document.createElement("li");

item.innerText=text;

list.appendChild(item);

}

setPoints(getPoints());

</script>

</body>
</html>
