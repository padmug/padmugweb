<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padmug Web v2</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#e8faf5;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.header{
text-align:center;
margin-bottom:15px;
}

.header h1{
color:#0aa67a;
margin-bottom:5px;
}

.card{
background:white;
padding:18px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
margin-bottom:12px;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:10px;
font-size:15px;
margin-top:10px;
background:#0aa67a;
color:white;
cursor:pointer;
}

button:hover{
background:#088e67;
}

.nav{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.section{
display:none;
}

.active{
display:block;
}

.points{
font-size:26px;
font-weight:bold;
color:#0aa67a;
}

.progress{
height:8px;
background:#e2e2e2;
border-radius:10px;
overflow:hidden;
margin-top:8px;
}

.bar{
height:8px;
background:#0aa67a;
width:0%;
}

.info{
font-size:14px;
color:#555;
}

ul{
padding-left:18px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Padmug Web</h1>
<div id="welcome"></div>
</div>

<div class="card">
⭐ Points
<div class="points" id="points">0</div>

<div class="progress">
<div class="bar" id="progressbar"></div>
</div>

</div>

<div id="home" class="section active">

<div class="card">

<div class="nav">

<button onclick="show('daily')">🎁 Daily Reward</button>

<button onclick="show('giveaway')">🎟 Giveaway</button>

<button onclick="show('leaderboard')">🏆 Leaderboard</button>

<button onclick="show('profile')">👤 Profile</button>

</div>

</div>

</div>


<div id="daily" class="section">

<div class="card">

<h3>🎁 Daily Reward</h3>

<p class="info">Claim your daily Padmug points.</p>

<button onclick="claimDaily()">Claim +10 Points</button>

<p id="dailyStatus"></p>

<button onclick="show('home')">⬅ Back</button>

</div>

</div>


<div id="giveaway" class="section">

<div class="card">

<h3>🎟 Giveaway Entry</h3>

<p class="info">Cost: 20 points</p>

<button onclick="joinGiveaway()">Enter Giveaway</button>

<p id="giveawayStatus"></p>

<button onclick="show('home')">⬅ Back</button>

</div>

</div>


<div id="leaderboard" class="section">

<div class="card">

<h3>🏆 Leaderboard</h3>

<ul>

<li>@user1 — 340 pts</li>
<li>@user2 — 275 pts</li>
<li>@user3 — 210 pts</li>

</ul>

<p class="info">Leaderboard will sync with bot later.</p>

<button onclick="show('home')">⬅ Back</button>

</div>

</div>


<div id="profile" class="section">

<div class="card">

<h3>👤 Profile</h3>

<p id="profileInfo"></p>

<button onclick="show('home')">⬅ Back</button>

</div>

</div>


<div class="card">

<h3>📊 Activity</h3>

<ul id="activityLog"></ul>

</div>

</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe.user;

if(user){

document.getElementById("welcome").innerText =
"Hello " + user.first_name;

document.getElementById("profileInfo").innerHTML =
"<b>Name:</b> "+user.first_name+
"<br><b>Username:</b> @"+(user.username || "none")+
"<br><b>ID:</b> "+user.id;

}

function show(section){

document.querySelectorAll(".section")
.forEach(s=>s.classList.remove("active"));

document.getElementById(section)
.classList.add("active");

}

function getPoints(){

let p=localStorage.getItem("padmug_points");

if(!p) p=0;

return parseInt(p);

}

function setPoints(val){

localStorage.setItem("padmug_points",val);

document.getElementById("points").innerText=val;

updateProgress();

}

function updateProgress(){

let p=getPoints();

let percent=(p/100)*100;

if(percent>100) percent=100;

document.getElementById("progressbar")
.style.width=percent+"%";

}

function claimDaily(){

let last=localStorage.getItem("padmug_daily");

let today=new Date().toDateString();

if(last===today){

document.getElementById("dailyStatus")
.innerText="Already claimed today.";

return;

}

let points=getPoints()+10;

setPoints(points);

localStorage.setItem("padmug_daily",today);

document.getElementById("dailyStatus")
.innerText="+10 points added!";

logActivity("Claimed daily reward");

}

function joinGiveaway(){

let points=getPoints();

if(points<20){

document.getElementById("giveawayStatus")
.innerText="Not enough points.";

return;

}

points-=20;

setPoints(points);

document.getElementById("giveawayStatus")
.innerText="Entry confirmed! (demo)";

logActivity("Entered giveaway");

}

function logActivity(text){

let list=document.getElementById("activityLog");

let item=document.createElement("li");

item.innerText=text;

list.appendChild(item);

}

setPoints(getPoints());

</script>

</body>
</html>
